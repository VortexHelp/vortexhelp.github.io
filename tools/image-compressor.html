<section class="hero">

<h1>Image Compressor</h1>

<p>

Compress JPG, PNG and WEBP images online for free.

</p>

<div class="calculator-box">

<label>Select Image</label>

<input
type="file"
id="imageInput"
accept="image/*">

<br><br>

<img
id="previewImage"
style="max-width:100%;display:none;border-radius:12px;">

<br><br>

<label>

Compression Quality

<span id="qualityValue">

80%

</span>

</label>

<input

type="range"

id="quality"

min="10"

max="100"

value="80">

<br><br>

<button

class="btn"

onclick="compressImage()">

Compress Image

</button>

<a

id="downloadBtn"

class="tool-btn"

style="display:none;"

download="compressed-image.jpg">

Download Image

</a>

<p id="result"></p>

</div>

</section>
