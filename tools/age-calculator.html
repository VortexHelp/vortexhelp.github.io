<h1>Age Calculator</h1>

<p>
Calculate your exact age instantly for free.
</p>


<div class="calculator-box">

<input type="date" id="birthDate">

<br><br>

<button class="btn" onclick="calculateAge()">
Calculate Age
</button>

<br><br>

<h2 id="result"></h2>

<script>

function calculateAge(){

let dob=document.getElementById("birthDate").value;

if(dob==""){

document.getElementById("result").innerHTML="Please select your date of birth.";

return;

}

let birth=new Date(dob);

let today=new Date();

let age=today.getFullYear()-birth.getFullYear();

let month=today.getMonth()-birth.getMonth();

if(month<0 || (month===0 && today.getDate()<birth.getDate())){

age--;

}

document.getElementById("result").innerHTML="🎉 Your Age is <b>"+age+"</b> Years";

}

</script>
