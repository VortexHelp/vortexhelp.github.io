<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PDF - VortexHelp</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<div class="logo">

<a href="../index.html">

<img src="../logo.png" alt="VortexHelp Logo">

<span>VortexHelp</span>

</a>

</div>

<div class="menu-toggle" id="menuToggle">
☰
</div>

<nav id="navbar">

<a href="../index.html">Home</a>

<a href="pdf-tools.html">PDF Tools</a>

<a href="../index.html#tools">All Tools</a>

</nav>

</header>

<section class="hero">

<h1>Image to PDF</h1>

<p>

Convert JPG, PNG and WEBP images into PDF documents for free.

</p>

<div class="calculator-box">

<label>Select Images</label>

<input
type="file"
id="imageInput"
accept="image/png,image/jpeg,image/webp"
multiple>

<br><br>

<div id="previewContainer"></div>

<br>

<button
class="btn"
onclick="createPDF()">

Create PDF

</button>

<button
class="tool-btn"
onclick="resetPDFTool()">

Reset

</button>

<br><br>

<a
id="downloadBtn"
class="tool-btn"
style="display:none;"
download="VortexHelp-Image-to-PDF.pdf">

Download PDF

</a>

<p id="result"></p>

</div>

</section>

<footer>

<div>

<h3>VortexHelp</h3>

<p>

</p>

</footer>

<script src="../script.js"></script>

<script>

const imageInput = document.getElementById("imageInput");
const previewContainer = document.getElementById("previewContainer");
const downloadBtn = document.getElementById("downloadBtn");
const result = document.getElementById("result");

let selectedFiles = [];

imageInput.addEventListener("change", function () {

selectedFiles = Array.from(this.files);

previewContainer.innerHTML = "";

downloadBtn.style.display = "none";

result.innerHTML = "";

selectedFiles.forEach(file => {

const img = document.createElement("img");

img.src = URL.createObjectURL(file);

img.style.width = "120px";
img.style.margin = "8px";
img.style.borderRadius = "10px";
img.style.border = "2px solid #334155";

previewContainer.appendChild(img);

});

});

async function createPDF() {

if (selectedFiles.length === 0) {

result.innerHTML = "❌ Please select at least one image.";

return;

}

const { jsPDF } = window.jspdf;

const pdf = new jsPDF("p", "mm", "a4");

for (let i = 0; i < selectedFiles.length; i++) {

const file = selectedFiles[i];

const imageData = await new Promise((resolve) => {

const reader = new FileReader();

reader.onload = function (e) {

resolve(e.target.result);

};

reader.readAsDataURL(file);

});

const img = new Image();

img.src = imageData;

await new Promise((resolve) => {

img.onload = resolve;

});

const pageWidth = 210;

const pageHeight = 297;

const margin = 10;

const maxWidth = pageWidth - (margin * 2);

const maxHeight = pageHeight - (margin * 2);

let width = img.width;

let height = img.height;

const scale = Math.min(maxWidth / width, maxHeight / height);

width *= scale;

height *= scale;

const x = (pageWidth - width) / 2;

const y = (pageHeight - height) / 2;

if (i > 0) {

pdf.addPage();

}

const format = file.type.includes("png") ? "PNG" : "JPEG";

pdf.addImage(imageData, format, x, y, width, height);

}

const pdfBlob = pdf.output("blob");

const pdfURL = URL.createObjectURL(pdfBlob);

downloadBtn.href = pdfURL;

downloadBtn.style.display = "inline-block";

result.innerHTML = "✅ PDF created successfully! Click the Download PDF button.";

}

function resetPDFTool() {

imageInput.value = "";

selectedFiles = [];

previewContainer.innerHTML = "";

downloadBtn.style.display = "none";

downloadBtn.removeAttribute("href");

result.innerHTML = "";

}

</script>

</body>

</html>
